name: "\U0001F41B Bug Report (버그 제보)"
description: Unity 클라이언트에서 발생한 버그를 제보하는 템플릿입니다.
title: "[BUG] "
labels: ["bug"]
body:
  - type: dropdown
    id: severity
    attributes:
      label: "\U0001F525 심각도"
      options:
        - "Critical (앱 크래시 / 데이터 유실)"
        - "High (주요 기능 동작 불가)"
        - "Normal (일반 버그)"
        - "Low (사소한 문제 / UI 깨짐)"
    validations:
      required: true

  - type: dropdown
    id: scene
    attributes:
      label: "\U0001F3AC 발생 씬/화면"
      options:
        - "Boot Scene (로딩/페어링)"
        - "Main Scene — 대기 화면"
        - "Main Scene — 대화 화면"
        - "Main Scene — 지도/WebView"
        - "마스코트 (3D/애니메이션/립싱크)"
        - "네트워크 (API/WebSocket)"
        - "오디오 (STT/TTS/마이크)"
        - "빌드 (Windows)"
        - "기타"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "\U0001F4DD 버그 설명"
      description: 어떤 버그인지 명확하게 설명해주세요.
      placeholder: |
        부트스트랩 후 마스코트 GLB 로딩이 실패하고 콘솔에 NullReferenceException 발생
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: "\U0001F504 재현 방법"
      description: 어떻게 하면 버그가 재현되는지 알려주세요.
      placeholder: |
        1. config.json에 유효한 토큰 설정
        2. Unity Editor에서 Boot 씬 Play
        3. 인증 성공 후 Main 씬 로드 시 에러 발생
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "\U0001F4A1 예상 동작"
      placeholder: 마스코트 GLB가 정상 로드되어 씬에 표시되어야 함
    validations:
      required: false

  - type: textarea
    id: console-log
    attributes:
      label: "\U0001F4CB Console 로그"
      description: Unity Console 에러 로그를 붙여넣어 주세요.
      render: shell
      placeholder: |
        NullReferenceException: Object reference not set to an instance of an object
        at Guideon.Mascot.MascotManager.LoadModel() ...
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: "\U0001F5A5\uFE0F 환경"
      placeholder: |
        - Unity 버전: 6000.0.x LTS
        - OS: Windows 11
        - 실행 환경: Editor / Windows Build
        - 서버: localhost:8082 / realguideon.duckdns.org
    validations:
      required: false
